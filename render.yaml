services:
  - type: web
    name: nyxvault
    runtime: python
    buildCommand: pip install -r nyxvault-backend/requirements.txt
    startCommand: python nyxvault-backend/app.py
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_FOLDER
        value: uploads
      - key: DATABASE_URL
        value: sqlite:///nyxvault.db
